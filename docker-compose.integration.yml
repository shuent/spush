services:
  sftp:
    image: atmoz/sftp:alpine
    ports:
      - "2222:22"
    command: "spush:password:1001:1001:upload"
    volumes:
      - sftp-data:/home/spush/upload
      - ./tests/integration/fixtures/sftp_keys:/home/spush/.ssh/keys:ro

  sftp-web:
    image: php:8.3-apache
    ports:
      - "8081:80"
    volumes:
      - sftp-data:/var/www/html:ro
    depends_on:
      - sftp
    healthcheck:
      test: ["CMD-SHELL", "php -v >/dev/null"]
      interval: 2s
      timeout: 3s
      retries: 30

  ftp:
    image: delfer/alpine-ftp-server:latest
    ports:
      - "2121:21"
      - "21100-21110:21100-21110"
    environment:
      USERS: "spush|password"
      ADDRESS: localhost
      MIN_PORT: 21100
      MAX_PORT: 21110
    volumes:
      - ftp-data:/ftp

  ftp-web:
    image: php:8.3-apache
    ports:
      - "8082:80"
    volumes:
      - ftp-data:/var/www/html:ro
    depends_on:
      - ftp
    healthcheck:
      test: ["CMD-SHELL", "php -v >/dev/null"]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  sftp-data:
  ftp-data:
